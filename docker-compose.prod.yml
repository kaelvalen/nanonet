services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: nanonet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nanonet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD gerekli}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: nanonet-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD gerekli}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nanonet-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@db:5432/nanonet?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET gerekli — min 32 karakter}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      PORT: "8080"
      FRONTEND_URL: https://${DOMAIN:?DOMAIN gerekli}
      POLL_DEFAULT_SEC: "${POLL_DEFAULT_SEC:-10}"
      WS_MAX_CONNECTIONS: "${WS_MAX_CONNECTIONS:-1000}"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      K8S_NAMESPACE: ${K8S_NAMESPACE:-}
      GIN_MODE: release
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    container_name: nanonet-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: /api/v1
      VITE_WS_URL: wss://${DOMAIN}/ws
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:1.25-alpine
    container_name: nanonet-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - frontend
      - backend
    networks:
      - internal
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent:
    build: ./agent
    container_name: nanonet-agent
    restart: unless-stopped
    profiles:
      - agent
    environment:
      NANONET_BACKEND: wss://${DOMAIN}/ws
      NANONET_SERVICE_ID: ${AGENT_SERVICE_ID:?AGENT_SERVICE_ID eksik}
      NANONET_TOKEN: ${AGENT_TOKEN:?AGENT_TOKEN eksik}
      NANONET_HOST: ${AGENT_TARGET_HOST:-backend}
      NANONET_PORT: ${AGENT_TARGET_PORT:-8080}
      NANONET_HEALTH_ENDPOINT: ${AGENT_HEALTH_ENDPOINT:-/health}
      NANONET_POLL_INTERVAL: ${AGENT_POLL_INTERVAL:-10}
      NANONET_ERROR_RATE_WINDOW: ${AGENT_ERROR_RATE_WINDOW:-20}
      NANONET_RESTART_CMD: ${AGENT_RESTART_CMD:-}
      NANONET_STOP_CMD: ${AGENT_STOP_CMD:-}
    depends_on:
      - backend
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  internal:
    name: nanonet_prod_internal
    driver: bridge
